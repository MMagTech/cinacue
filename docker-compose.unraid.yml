# ---------------------------------------------------------------------------
# CinaCue — Unraid deployment (pulls the prebuilt image from GHCR).
#
# Unlike docker-compose.yml (which builds locally with `build: .`), this file
# pulls the CI-published image, so Unraid never needs the source or a compiler.
#
# Deploy with the "Compose Manager" plugin (Community Applications):
#   1) Plugins -> Compose Manager -> Add New Stack -> "cinacue".
#   2) Paste this file. Put your secrets in a .env alongside it (see below).
#   3) Compose Up.
#
# Requires the NVIDIA driver plugin (Unraid: "Nvidia Driver" in CA) so
# `runtime: nvidia` can expose the GPU for h264_nvenc.
#
# Minimal .env (same folder as this file):
#   ADMIN_PASSWORD=change-me-on-first-run
#   PLEX_URL=http://192.168.1.10:32400
#   PLEX_TOKEN=your-plex-token
#   PLEX_LIBRARY_NAME=Movies
#   NVIDIA_VISIBLE_DEVICES=GPU-xxxxxxxx   # `nvidia-smi -L` on the host
# ---------------------------------------------------------------------------
services:
  cinacue:
    image: ghcr.io/mmagtech/cinacue:latest
    container_name: cinacue
    restart: unless-stopped

    # NVIDIA GPU access via the classic Unraid runtime.
    runtime: nvidia

    # When fronting CinaCue with Traefik, route by hostname instead of a host
    # port. You can drop the ports mapping below; keep it only if you also want
    # direct LAN access at http://<unraid-ip>:8090/.
    ports:
      # host:container — browse at http://<unraid-ip>:8090/  (admin at /admin)
      - "8090:8000"

    # --- Traefik reverse-proxy labels --------------------------------------
    # Requires an external Traefik network (default name "proxy"; see the
    # networks: block at the bottom). Override any of these in your .env:
    #   CINACUE_HOST=cinacue.mmagtech.com
    #   TRAEFIK_ENTRYPOINT=websecure                     # your HTTPS entrypoint
    #   TRAEFIK_CERTRESOLVER=cloudflare                  # your ACME resolver
    #   TRAEFIK_MIDDLEWARES=traefik-real-ip@file,geoblock@file,crowdsec@file,rate-limit@file,noindex@file,security-headers@file
    #   TRAEFIK_NETWORK=proxy
    # Also set SESSION_COOKIE_SECURE=true in .env when served over HTTPS.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      # Router: match requests for your hostname on the HTTPS entrypoint.
      - "traefik.http.routers.cinacue.rule=Host(`${CINACUE_HOST:-cinacue.mmagtech.com}`)"
      - "traefik.http.routers.cinacue.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.cinacue.tls=true"
      - "traefik.http.routers.cinacue.tls.certresolver=${TRAEFIK_CERTRESOLVER:-cloudflare}"
      # Standard file-provider middleware chain (matches the other stacks).
      # Verified safe for CinaCue's browser HLS player:
      #   - rate-limit@file: 200 req/s avg / 300 burst per client IP — HLS uses
      #     ~1-2 req/s per viewer, so no throttling of playback.
      #   - security-headers@file: no CSP and no frameDeny, so it neither blocks
      #     the hls.js player nor iframe embedding (Organizr/Homarr).
      - "traefik.http.routers.cinacue.middlewares=${TRAEFIK_MIDDLEWARES:-traefik-real-ip@file,geoblock@file,crowdsec@file,rate-limit@file,noindex@file,security-headers@file}"
      - "traefik.http.routers.cinacue.priority=100"
      # Service: the container listens on 8000 (not the published host port).
      - "traefik.http.services.cinacue.loadbalancer.server.port=8000"
      # Flush the proxy buffer promptly so HLS segments/playlists reach clients
      # without added latency (matches the streaming-app convention).
      - "traefik.http.services.cinacue.loadbalancer.responseForwarding.flushInterval=1s"
      - "com.docker.compose.project=cinacue"
      - "com.docker.compose.service=cinacue"

    environment:
      TZ: ${TZ:-America/New_York}

      # --- Plex ---
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_LIBRARY_NAME: ${PLEX_LIBRARY_NAME:-Movies}
      # Path translation: how Plex reports paths -> where they are mounted here.
      PLEX_PATH_PREFIX: ${PLEX_PATH_PREFIX:-/movies}
      LOCAL_PATH_PREFIX: ${LOCAL_PATH_PREFIX:-/media/movies}

      # Seed the admin password on the FIRST run, then remove this line.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Shared code friends enter to watch (blank = open viewer for LAN use).
      PUBLIC_ACCESS_CODE: ${PUBLIC_ACCESS_CODE:-}

      # --- Encoding (GPU) ---
      ENCODER: ${ENCODER:-h264_nvenc}
      ENCODER_PRESET: ${ENCODER_PRESET:-balanced}
      MAX_RESOLUTION: ${MAX_RESOLUTION:-1080p}
      VIDEO_BITRATE_KBPS: ${VIDEO_BITRATE_KBPS:-8000}
      AUDIO_BITRATE_KBPS: ${AUDIO_BITRATE_KBPS:-192}

      # --- Behaviour / security ---
      # Set true when served through an HTTPS reverse proxy.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Arm the channel on startup so it idles during schedule gaps and wakes
      # for scheduled movies on its own (Stop still overrides). Recommended true.
      CHANNEL_AUTO_START: ${CHANNEL_AUTO_START:-false}
      # Warm ffmpeg up this many seconds before each movie's start (0 = off).
      CHANNEL_PREROLL_SECONDS: ${CHANNEL_PREROLL_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # NVIDIA plumbing. Pin NVIDIA_VISIBLE_DEVICES to a specific GPU UUID
      # (`nvidia-smi -L`) if you don't want all GPUs exposed.
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility

      CONFIG_DIR: /config
      STREAM_DIR: /stream

    # Join the shared Traefik network so the proxy can reach this container.
    networks:
      - proxy

    volumes:
      # Persistent appdata: SQLite DB, app secret, admin password hash.
      - /mnt/user/appdata/cinacue:/config
      # Movie library, read-only. Mounted at /data/movies to match the path
      # Plex reports, so no path translation is needed.
      - /mnt/user/data/media/movies:/data/movies:ro
      # RAM-backed HLS output (fast + saves disk wear). Sized generously.
      - type: tmpfs
        target: /stream
        tmpfs:
          size: 2147483648   # 2 GiB

    # Modern Compose GPU reservation. Harmless alongside `runtime: nvidia`;
    # newer Docker on Unraid honours this form.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, video, utility]

# --- Reverse proxy network --------------------------------------------------
# The Traefik labels above route by hostname over this shared network. It must
# already exist and be the same network Traefik itself is attached to. Create
# it once on the host if needed:
#     docker network create proxy
# If your Traefik network has a different name, change it here and set
# TRAEFIK_NETWORK in your .env to match.
networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
